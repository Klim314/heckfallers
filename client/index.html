<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexa War Sim</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span class="brand">HEXA</span>
        <span class="stat" id="stat-se">SE: --%</span>
        <span class="stat" id="stat-enemy">Enemy: --%</span>
        <span class="stat" id="stat-contested">Contested: --</span>
        <span class="stat" id="stat-tick">Tick 0</span>
        <span class="stat" id="stat-elapsed">0:00</span>
        <span class="stat" id="stat-requisition" title="HighCommand build pool">Req: 0</span>
        <span class="stat status" id="stat-status">paused</span>
      </header>
      <main id="map">
        <canvas id="canvas"></canvas>
        <div id="banner" class="hidden"></div>
      </main>
      <aside id="sidebar">
        <section class="panel">
          <h3>Sim</h3>
          <div class="row">
            <button id="btn-start">Start</button>
            <button id="btn-pause">Pause</button>
            <button id="btn-reset">Reset</button>
          </div>
          <div class="row">
            <label>Speed</label>
            <input type="range" id="speed" min="0.5" max="10" step="0.5" value="1" />
            <span id="speed-val">1x</span>
          </div>
        </section>

        <section class="panel">
          <h3>Selected cell</h3>
          <div id="cell-info">click a hex</div>
          <div class="row">
            <label>Diver pressure</label>
            <input type="range" id="pressure" min="0" max="500" step="10" value="0" disabled />
            <span id="pressure-val">0</span>
          </div>
          <div class="row poi-buttons">
            <button data-poi="fob" data-owner="se">+ FOB</button>
            <button data-poi="artillery" data-owner="se">+ Arty</button>
            <button data-poi="fortress" data-owner="enemy">+ Fortress</button>
            <button data-poi="resistance_node" data-owner="enemy">+ Node</button>
            <button data-poi="factory" data-owner="enemy">+ Factory</button>
          </div>
          <div class="row">
            <button id="btn-fire">Fire artillery here</button>
          </div>
        </section>

        <section class="panel">
          <h3>Globals</h3>
          <div class="row">
            <label title="baseline progress per second on contested cells">Base rate</label>
            <input type="range" data-param="base_rate" min="0" max="3" step="0.1" value="0.5" />
            <span data-show="base_rate">0.5</span>
          </div>
          <div class="row">
            <label title="progress per (pressure-unit * second)">Pressure coef</label>
            <input type="range" data-param="pressure_coefficient" min="0.01" max="0.2" step="0.01" value="0.05" />
            <span data-show="pressure_coefficient">0.05</span>
          </div>
          <div class="row">
            <label title="defender resistance magnitude per contested cell (supply-scaled at apply)">Enemy resistance</label>
            <input type="range" data-param="enemy_resistance_base" min="0" max="20" step="0.5" value="6" />
            <span data-show="enemy_resistance_base">6</span>
          </div>
          <div class="row">
            <label title="total SE force the diver AI distributes across contested cells each allocation pass">Diver pool</label>
            <input type="range" data-param="diver_pool" min="0" max="3000" step="50" value="1500" />
            <span data-show="diver_pool">1500</span>
          </div>
          <div class="row">
            <label title="softmax temperature; low concentrates divers on top targets, high spreads them across the front">Allocation temp</label>
            <input type="range" data-param="allocation_temperature" min="0.2" max="3" step="0.1" value="1" />
            <span data-show="allocation_temperature">1</span>
          </div>
          <div class="row">
            <label title="ticks between factory placement attempts; at default tick_hz=5 each tick is 0.2s">Factory period</label>
            <input type="range" data-param="factory_period_ticks" min="10" max="500" step="10" value="50" />
            <span data-show="factory_period_ticks">50</span>
          </div>
        </section>

        <section class="panel">
          <h3>Selected POI</h3>
          <div id="poi-info">click a POI</div>
          <div class="row">
            <button id="btn-remove-poi" disabled>Remove POI</button>
          </div>
        </section>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
